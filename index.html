<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miyu</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23000%22/></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #000000; --surface-color: rgba(20, 20, 20, 0.6); --surface-hover: rgba(40, 40, 40, 0.8);
            --text-primary: #ffffff; --text-secondary: #888888; --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.1); --glass-blur: blur(20px); --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        [data-theme="light"] {
            --bg-color: #f5f5f7; --surface-color: rgba(255, 255, 255, 0.7); --surface-hover: rgba(240, 240, 240, 0.9);
            --text-primary: #000000; --text-secondary: #666666; --accent: #000000;
            --border: rgba(0, 0, 0, 0.05); --shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        ::backdrop { background-color: var(--bg-color); }
        :fullscreen { background-color: var(--bg-color); display: flex; flex-direction: column; width: 100vw; height: 100vh; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-primary); min-height: 100vh; overflow: hidden; display: flex; flex-direction: column; transition: background-color 0.3s, color 0.3s; }
        .glass { background: var(--surface-color); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 0.5px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); }
        
        .hidden { display: none !important; }
        .flex { display: flex; } .flex-col { display: flex; flex-direction: column; }
        .items-center { align-items: center; } .justify-between { justify-content: space-between; } .justify-center { justify-content: center; }
        .gap-2 { gap: 8px; } .gap-4 { gap: 16px; }

        button { background: none; border: none; color: inherit; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; outline: none; }
        button:hover:not(:disabled) { opacity: 0.7; transform: scale(0.98); }
        button:active:not(:disabled) { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-primary { background: var(--text-primary); color: var(--bg-color); padding: 12px 20px; border-radius: 20px; font-weight: 500; font-size: 14px; width: 100%; transition: 0.3s; }
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--surface-color); border: 0.5px solid var(--border); }
        input { background: var(--surface-color); border: 0.5px solid var(--border); color: var(--text-primary); padding: 12px 16px; border-radius: 12px; outline: none; width: 100%; transition: 0.2s; }
        input:focus { border-color: var(--text-secondary); }
        
        #app-screen { flex: 1; display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; }
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        main { flex: 1; overflow-y: auto; padding: 0 20px 140px 20px; scroll-behavior: smooth; } 
        main::-webkit-scrollbar { display: none; }
        
        h2 { font-size: 18px; font-weight: 500; margin-bottom: 16px; margin-top: 24px; }
        .item-card { padding: 12px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; background: var(--surface-color); border: 0.5px solid var(--border); cursor: pointer; transition: 0.2s; }
        .item-card:hover { background: var(--surface-hover); }
        .item-info h4 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .item-info p { font-size: 12px; color: var(--text-secondary); }

        #player-container { position: absolute; bottom: 85px; left: 20px; right: 20px; padding: 16px; z-index: 20; display: flex; flex-direction: column; gap: 12px; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        #visualizer-canvas { width: 100%; height: 60px; border-radius: 8px; margin-bottom: 8px; pointer-events: none; }
        .player-controls { display: flex; justify-content: space-between; align-items: center; }
        .main-controls { display: flex; gap: 16px; align-items: center; }
        .play-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--text-primary); color: var(--bg-color); }
        .progress-container { width: 100%; height: 6px; background: var(--surface-hover); border-radius: 3px; cursor: pointer; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; pointer-events: none; }

        nav { position: absolute; bottom: 0; width: 100%; height: 70px; display: flex; justify-content: space-around; align-items: center; z-index: 30; background: var(--surface-color); backdrop-filter: var(--glass-blur); border-top: 0.5px solid var(--border); padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-secondary); font-size: 11px; width: 60px; cursor: pointer; }
        .nav-item.active { color: var(--text-primary); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal.active { opacity: 1; pointer-events: all; }
        .modal-content { width: 100%; max-width: 500px; background: var(--bg-color); border-top: 0.5px solid var(--border); border-radius: 24px 24px 0 0; padding: 24px; transform: translateY(100%); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); max-height: 85vh; overflow-y: auto; padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
        .modal.active .modal-content { transform: translateY(0); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 0.5px solid var(--border); }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); padding: 12px 24px; border-radius: 20px; font-size: 13px; z-index: 200; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); background: var(--surface-hover); color: var(--text-primary); border: 1px solid var(--border); text-align: center; max-width: 90%; box-shadow: var(--shadow); font-weight: 500; pointer-events: none;}
        #toast.show { transform: translateX(-50%) translateY(0); }
        
        .guest-message { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 14px; }
    </style>
</head>
<body>

    <div id="toast">Message</div>

    <div id="app-screen">
        <header>
            <h1 style="font-size: 20px; font-weight: 400; letter-spacing: 1px;">Miyu</h1>
            <div class="flex gap-4 items-center">
                <button type="button" onclick="App.ui.toggleFullscreen()" title="Fullscreen"><i class="ph ph-corners-out size-20" id="icon-fullscreen"></i></button>
                <button id="upload-btn-header" class="btn-icon hidden" onclick="App.ui.toggleModal('upload-modal')" title="Upload"><i class="ph ph-upload-simple"></i></button>
                <button class="btn-icon" onclick="App.ui.toggleModal('settings-modal')" title="Settings"><i class="ph ph-gear size-20"></i></button>
            </div>
        </header>

        <main id="main-content">
            <div id="tab-people" class="tab-content">
                <h2>Exploration</h2>
                <div id="users-list">
                    <p style="color:var(--text-secondary); font-size:12px;">Loading community...</p>
                </div>
            </div>

            <div id="tab-library" class="tab-content hidden">
                <div class="flex justify-between items-center">
                    <h2>Your Library</h2>
                </div>
                
                <div id="library-guest-msg" class="guest-message">
                    <i class="ph ph-lock-key size-32" style="margin-bottom: 12px; opacity: 0.5;"></i>
                    <p>Log in to upload music and manage your personal library.</p>
                    <button type="button" class="btn-primary" style="margin-top: 20px;" onclick="App.ui.toggleModal('login-modal')">Log In</button>
                </div>

                <div id="library-user-content" class="hidden">
                    <h3>Playlists <button type="button" id="create-playlist-btn" onclick="App.library.createPlaylist()" style="display:inline; color:var(--text-secondary)"><i class="ph ph-plus-circle"></i></button></h3>
                    <div id="playlists-list" class="flex-col gap-2"></div>
                    <h3 style="margin-top:20px;">All Songs</h3>
                    <div id="songs-list" class="flex-col gap-2"></div>
                </div>
            </div>
        </main>

        <div id="player-container" class="glass">
            <canvas id="visualizer-canvas"></canvas>
            <div class="flex justify-between items-center" style="margin-bottom: 8px;">
                <div class="item-info" style="max-width: 65%; overflow: hidden; white-space: nowrap;">
                    <h4 id="player-title">No track selected</h4>
                    <p id="player-artist">Miyu Space</p>
                </div>
                <div style="font-size: 11px; color: var(--text-secondary); font-variant-numeric: tabular-nums;"><span id="time-current">0:00</span> / <span id="time-total">0:00</span></div>
            </div>
            <div class="progress-container" onclick="App.audio.seek(event)">
                <div class="progress-bar" id="player-progress"></div>
            </div>
            <div class="player-controls" style="margin-top: 12px;">
                <button type="button" onclick="App.audio.toggleShuffle()"><i class="ph ph-shuffle size-20" id="icon-shuffle"></i></button>
                <div class="main-controls">
                    <button type="button" onclick="App.audio.prev()"><i class="ph ph-skip-back size-24"></i></button>
                    <button type="button" class="play-btn" onclick="App.audio.togglePlay()"><i class="ph ph-play size-24" id="icon-play"></i></button>
                    <button type="button" onclick="App.audio.next()"><i class="ph ph-skip-forward size-24"></i></button>
                </div>
                <button type="button" onclick="App.audio.toggleLoop()"><i class="ph ph-repeat size-20" id="icon-loop"></i></button>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="App.ui.switchTab('people')">
                <i class="ph ph-users size-24"></i>
                <span>People</span>
            </div>
            <div class="nav-item" onclick="App.ui.switchTab('library')">
                <i class="ph ph-music-notes size-24"></i>
                <span>Library</span>
            </div>
        </nav>

        <div id="login-modal" class="modal" onclick="if(event.target===this) App.ui.toggleModal('login-modal')">
            <div class="modal-content flex-col gap-4">
                <h2 style="text-align: center; margin-top: 0;">Welcome Back</h2>
                <input type="text" id="auth-handle" placeholder="Handle (e.g., alex)" autocomplete="off" autocapitalize="none">
                <input type="password" id="auth-password" placeholder="Password">
                <button type="button" id="login-btn" class="btn-primary" onclick="App.auth.login()">Enter</button>
            </div>
        </div>

        <div id="settings-modal" class="modal" onclick="if(event.target===this) App.ui.toggleModal('settings-modal')">
            <div class="modal-content">
                <h2 style="margin-top: 0;">Settings</h2>
                <div class="setting-row">
                    <span>Dark Mode</span>
                    <button type="button" onclick="App.settings.toggleTheme()"><i class="ph ph-moon size-20"></i></button>
                </div>
                <div id="auth-status-row" class="setting-row" style="border-bottom: none; padding-bottom: 0;"></div>
            </div>
        </div>

        <div id="upload-modal" class="modal" onclick="if(event.target===this) App.ui.toggleModal('upload-modal')">
            <div class="modal-content flex-col gap-4">
                <h2 style="margin-top: 0;">Upload Track</h2>
                <input type="text" id="upload-title" placeholder="Song Title (optional)">
                <input type="file" id="upload-file" accept="audio/*" style="padding: 10px 0; border: none; background: transparent;">
                
                <div id="upload-progress-container" class="hidden" style="width: 100%; height: 6px; background: var(--surface-hover); border-radius: 3px; overflow: hidden; margin-top: 8px;">
                    <div id="upload-progress-bar" style="height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear, background-color 0.3s;"></div>
                </div>

                <button type="button" id="upload-submit-btn" class="btn-primary" onclick="App.library.uploadSong()">Upload to Miyu</button>
            </div>
        </div>
    </div>

    <script>
        window.onerror = function(message, source, lineno) { console.error("SYSTEM ERROR:", message, "Line:", lineno); return true; };

        const MIYU_URL = 'https://vfkkoacakiaulcjviyfe.supabase.co';
        const MIYU_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZma2tvYWNha2lhdWxjanZpeWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMTQxNjAsImV4cCI6MjA4OTY5MDE2MH0.qlXPSD-31q-UrTDja9wN2QXp8Fazm2zORKaFuzJ1vq4';
        
        const miyuDB = window.supabase.createClient(MIYU_URL, MIYU_KEY);

        const App = {
            state: {
                user: null, userHandle: '', theme: 'dark',
                songs: [], playlists: [], users: [], queue: [], currentIndex: -1,
                isPlaying: false, loop: false, shuffle: false
            },
            audioElement: new Audio(),

            init() {
                this.ui.setupGuestMode();
                this.visualizer.init();
                
                this.audioElement.addEventListener('timeupdate', () => this.ui.updateProgress());
                this.audioElement.addEventListener('ended', () => this.audio.handleEnd());
                this.audioElement.addEventListener('play', () => { 
                    this.state.isPlaying = true; 
                    document.getElementById('icon-play').classList.replace('ph-play', 'ph-pause'); 
                });
                this.audioElement.addEventListener('pause', () => { 
                    this.state.isPlaying = false; 
                    document.getElementById('icon-play').classList.replace('ph-pause', 'ph-play'); 
                });

                document.addEventListener('fullscreenchange', () => {
                    const icon = document.getElementById('icon-fullscreen');
                    if (document.fullscreenElement) { icon.classList.replace('ph-corners-out', 'ph-corners-in'); } 
                    else { icon.classList.replace('ph-corners-in', 'ph-corners-out'); }
                });

                this.checkSession();
                this.explore.loadUsers(); 
            },

            async checkSession() {
                try {
                    const { data: { session }, error } = await miyuDB.auth.getSession();
                    if (error) throw error;
                    if (session) { await this.auth.handleSession(session.user); }
                } catch (err) { console.warn("Session check skipped:", err.message); }
            },

            auth: {
                async login() {
                    const btn = document.getElementById('login-btn');
                    try {
                        let handle = document.getElementById('auth-handle').value.trim().toLowerCase();
                        const password = document.getElementById('auth-password').value;
                        
                        if(!handle || !password) { App.ui.toast("Please enter both handle and password."); return; }
                        
                        btn.innerText = "Authenticating...";
                        
                        const email = `${handle}@miyu.app`;
                        const { data, error } = await miyuDB.auth.signInWithPassword({ email, password });
                        
                        if (error) { App.ui.toast("Login Failed: " + error.message); return; }
                        
                        App.ui.toggleModal('login-modal');
                        App.ui.toast("Success! Loading library...");
                        await this.handleSession(data.user);
                    } catch (err) { App.ui.toast("Error: " + err.message); } 
                    finally { btn.innerText = "Enter"; }
                },
                
                async handleSession(authUser) {
                    try {
                        const { data: userData } = await miyuDB.from('users').select('handle').eq('id', authUser.id).single();
                        App.state.user = authUser;
                        App.state.userHandle = userData ? userData.handle : authUser.email.split('@')[0];
                        App.ui.setupUserMode();
                        App.ui.toast(`Welcome back, @${App.state.userHandle}`);
                        App.library.loadLibrary();
                    } catch (err) { console.error("Session load error:", err); }
                },

                async logout() { await miyuDB.auth.signOut(); window.location.reload(); }
            },

            library: {
                async loadLibrary() {
                    if (!App.state.user) return;
                    try {
                        const { data: songs, error: sErr } = await miyuDB.from('songs').select('*').eq('user_id', App.state.user.id).order('created_at', { ascending: false });
                        if (sErr) throw sErr;
                        App.state.songs = songs || [];
                        
                        const { data: playlists, error: pErr } = await miyuDB.from('playlists').select('*').eq('user_id', App.state.user.id);
                        if (pErr) throw pErr;
                        App.state.playlists = playlists || [];

                        this.renderSongs(App.state.songs, 'songs-list');
                        
                        const plContainer = document.getElementById('playlists-list');
                        plContainer.innerHTML = App.state.playlists.map(pl => `
                            <div class="item-card"><div class="item-info"><h4>${pl.name}</h4></div></div>
                        `).join('');
                    } catch (err) { App.ui.toast("Library Load Error: " + err.message); }
                },
                
                renderSongs(songsArray, containerId) {
                    const container = document.getElementById(containerId);
                    if(songsArray.length === 0) { 
                        container.innerHTML = '<p style="color:var(--text-secondary); font-size:12px; text-align:center; padding: 20px;">No tracks found.</p>'; return; 
                    }
                    const safeQueue = btoa(encodeURIComponent(JSON.stringify(songsArray)));
                    container.innerHTML = songsArray.map((song, i) => `
                        <div class="item-card" onclick="App.audio.playQueue('${safeQueue}', ${i})">
                            <div class="item-info">
                                <h4>${song.title}</h4>
                                <p>${(song.file_size / 1024 / 1024).toFixed(2)} MB</p>
                            </div>
                            <button class="btn-icon" style="width:32px;height:32px;"><i class="ph ph-play"></i></button>
                        </div>
                    `).join('');
                },
                
                // --- NATIVE REAL-TIME UPLOAD ---
                async uploadSong() {
                    const btn = document.getElementById('upload-submit-btn');
                    const progressContainer = document.getElementById('upload-progress-container');
                    const progressBar = document.getElementById('upload-progress-bar');
                    const fileInput = document.getElementById('upload-file');
                    const titleInput = document.getElementById('upload-title');

                    try {
                        if(!fileInput.files.length) { App.ui.toast("Select an audio file"); return; }
                        
                        const { data: { session }, error: sessionErr } = await miyuDB.auth.getSession();
                        if (!session || sessionErr) { App.ui.toast("Authentication required to upload"); return; }

                        const file = fileInput.files[0];
                        if(!file.type.includes('audio')) { App.ui.toast("File must be audio format"); return; }

                        const title = titleInput.value.trim() || file.name.replace(/\.[^/.]+$/, "");
                        const safeFileName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '');
                        const filePath = `${App.state.user.id}/${Date.now()}_${safeFileName}`;
                        
                        // Setup UI
                        btn.innerText = "Uploading...";
                        btn.disabled = true;
                        progressContainer.classList.remove('hidden');
                        progressBar.style.backgroundColor = 'var(--accent)';
                        progressBar.style.width = '0%';

                        // Native XMLHttpRequest to track actual bytes uploaded
                        const xhr = new XMLHttpRequest();
                        
                        // Storage Endpoint
                        xhr.open('POST', `${MIYU_URL}/storage/v1/object/music/${filePath}`, true);
                        xhr.setRequestHeader('Authorization', `Bearer ${session.access_token}`);
                        xhr.setRequestHeader('apikey', MIYU_KEY);
                        xhr.setRequestHeader('Content-Type', file.type || 'audio/mpeg');

                        // Track Progress
                        xhr.upload.onprogress = (e) => {
                            if (e.lengthComputable) {
                                const percent = (e.loaded / e.total) * 100;
                                // We cap at 98% because we still need to wait for the Database Insert to finish
                                progressBar.style.width = `${Math.min(percent, 98)}%`;
                            }
                        };

                        // Handle Completion
                        xhr.onload = async () => {
                            if (xhr.status >= 200 && xhr.status < 300) {
                                // Storage upload succeeded! Now save metadata to the Database.
                                const { error: dbErr } = await miyuDB.from('songs').insert([
                                    { user_id: App.state.user.id, title, file_path: filePath, file_size: file.size }
                                ]);

                                if (dbErr) {
                                    progressBar.style.backgroundColor = '#ff3b30'; // Turn red
                                    App.ui.toast("Database Error: " + dbErr.message);
                                    btn.innerText = "Try Again";
                                    btn.disabled = false;
                                    return;
                                }

                                // 100% Success
                                progressBar.style.width = '100%';
                                
                                setTimeout(() => {
                                    App.ui.toast("Upload complete!");
                                    App.ui.toggleModal('upload-modal');
                                    fileInput.value = '';
                                    titleInput.value = '';
                                    progressBar.style.width = '0%';
                                    progressContainer.classList.add('hidden');
                                    btn.innerText = "Upload to Miyu";
                                    btn.disabled = false;
                                    this.loadLibrary();
                                }, 600);

                            } else {
                                // Supabase returned an error code (e.g. 403 Forbidden because of RLS)
                                let msg = "Storage rejected file";
                                try { msg = JSON.parse(xhr.responseText).message; } catch(e){}
                                progressBar.style.backgroundColor = '#ff3b30'; // Turn red
                                App.ui.toast("Upload Error: " + msg);
                                btn.innerText = "Try Again";
                                btn.disabled = false;
                            }
                        };

                        xhr.onerror = () => {
                            progressBar.style.backgroundColor = '#ff3b30'; // Turn red
                            App.ui.toast("Network Connection Lost");
                            btn.innerText = "Try Again";
                            btn.disabled = false;
                        };

                        // Send the actual file bytes
                        xhr.send(file);

                    } catch (err) {
                        App.ui.toast("Upload failed: " + err.message);
                        btn.innerText = "Try Again";
                        btn.disabled = false;
                    }
                },

                async createPlaylist() {
                    if (App.state.playlists.length >= 10) { App.ui.toast("Max 10 playlists allowed."); return; }
                    const name = prompt("Playlist Name:");
                    if (!name) return;
                    try {
                        await miyuDB.from('playlists').insert([{ user_id: App.state.user.id, name }]);
                        this.loadLibrary();
                    } catch (err) { App.ui.toast("Error creating playlist: " + err.message); }
                }
            },

            explore: {
                async loadUsers() {
                    try {
                        const { data, error } = await miyuDB.from('users').select('id, handle');
                        if (error) throw error;
                        
                        App.state.users = data || [];
                        const container = document.getElementById('users-list');
                        if(App.state.users.length === 0) {
                             container.innerHTML = '<p style="color:var(--text-secondary); font-size:12px; text-align:center;">No users found yet.</p>';
                        } else {
                            container.innerHTML = App.state.users.map(u => `
                                <div class="item-card" onclick="App.explore.viewUserSongs('${u.id}', '${u.handle}')">
                                    <div class="item-info"><h4>@${u.handle}</h4></div>
                                    <i class="ph ph-caret-right" style="color:var(--text-secondary)"></i>
                                </div>
                            `).join('');
                        }
                    } catch (err) { console.error("Could not load users", err); }
                },
                
                async viewUserSongs(userId, handle) {
                    try {
                        const { data: songs, error } = await miyuDB.from('songs').select('*').eq('user_id', userId);
                        if (error) throw error;

                        const container = document.getElementById('users-list');
                        container.innerHTML = `
                            <button type="button" onclick="App.explore.loadUsers()" style="margin-bottom:16px; color:var(--text-secondary); font-size: 14px;">
                                <i class="ph ph-arrow-left" style="margin-right:6px;"></i> Back to Community
                            </button>
                            <h3 style="margin-bottom:12px;">@${handle}'s Tracks</h3>
                            <div id="explore-songs-list" class="flex-col gap-2"></div>
                        `;
                        App.library.renderSongs(songs || [], 'explore-songs-list');
                    } catch (err) { App.ui.toast("Could not load tracks: " + err.message); }
                }
            },

            audio: {
                async playQueue(encodedQueue, index) {
                    try {
                        App.state.queue = JSON.parse(decodeURIComponent(atob(encodedQueue)));
                        App.state.currentIndex = index;
                        this.loadAndPlay(App.state.queue[index]);
                    } catch (err) { App.ui.toast("Error parsing track data."); }
                },
                loadAndPlay(song) {
                    document.getElementById('player-title').innerText = song.title;
                    document.getElementById('player-artist').innerText = "Loading Audio...";
                    
                    const { data } = miyuDB.storage.from('music').getPublicUrl(song.file_path);
                    
                    App.audioElement.src = data.publicUrl;
                    document.getElementById('player-artist').innerText = "Streaming HQ";
                    
                    App.audioElement.play().catch(e => {
                        console.warn("Autoplay prevented:", e);
                        App.ui.toast("Tap play to start audio");
                    });
                },
                togglePlay() {
                    if(!App.audioElement.src) return;
                    if(App.state.isPlaying) App.audioElement.pause();
                    else App.audioElement.play();
                },
                next() {
                    if (App.state.queue.length === 0) return;
                    let nextIdx = App.state.shuffle ? Math.floor(Math.random() * App.state.queue.length) : App.state.currentIndex + 1;
                    if (nextIdx >= App.state.queue.length) nextIdx = 0;
                    App.state.currentIndex = nextIdx;
                    this.loadAndPlay(App.state.queue[nextIdx]);
                },
                prev() {
                    if (App.audioElement.currentTime > 3) { App.audioElement.currentTime = 0; return; }
                    let prevIdx = App.state.currentIndex - 1;
                    if (prevIdx < 0) prevIdx = App.state.queue.length - 1;
                    App.state.currentIndex = prevIdx;
                    this.loadAndPlay(App.state.queue[prevIdx]);
                },
                handleEnd() {
                    if (App.state.loop) App.audioElement.play();
                    else this.next();
                },
                seek(e) {
                    if(!App.audioElement.src || !App.audioElement.duration) return;
                    const rect = e.currentTarget.getBoundingClientRect();
                    const percent = (e.clientX - rect.left) / rect.width;
                    App.audioElement.currentTime = percent * App.audioElement.duration;
                },
                toggleShuffle() {
                    App.state.shuffle = !App.state.shuffle;
                    document.getElementById('icon-shuffle').style.color = App.state.shuffle ? 'var(--accent)' : 'inherit';
                },
                toggleLoop() {
                    App.state.loop = !App.state.loop;
                    document.getElementById('icon-loop').style.color = App.state.loop ? 'var(--accent)' : 'inherit';
                }
            },

            ui: {
                setupGuestMode() {
                    document.getElementById('upload-btn-header').classList.add('hidden');
                    document.getElementById('library-guest-msg').classList.remove('hidden');
                    document.getElementById('library-user-content').classList.add('hidden');
                    document.getElementById('auth-status-row').innerHTML = `<button class="btn-primary" onclick="App.ui.toggleModal('settings-modal'); App.ui.toggleModal('login-modal');">Log In to Upload</button>`;
                },
                setupUserMode() {
                    document.getElementById('upload-btn-header').classList.remove('hidden');
                    document.getElementById('library-guest-msg').classList.add('hidden');
                    document.getElementById('library-user-content').classList.remove('hidden');
                    document.getElementById('auth-status-row').innerHTML = `<button class="btn-primary" style="background: #ff3b30;" onclick="App.auth.logout()">Log Out (@${App.state.userHandle})</button>`;
                },
                switchTab(tab) {
                    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    document.getElementById(`tab-${tab}`).classList.remove('hidden');
                    event.currentTarget.classList.add('active');
                },
                toggleModal(id) { document.getElementById(id).classList.toggle('active'); },
                toggleFullscreen() {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen().catch(err => { App.ui.toast(`Fullscreen unavailable: ${err.message}`); });
                    } else { if (document.exitFullscreen) { document.exitFullscreen(); } }
                },
                toast(msg) {
                    const el = document.getElementById('toast');
                    el.innerText = msg; el.classList.add('show');
                    setTimeout(() => el.classList.remove('show'), 3500);
                },
                formatTime(sec) {
                    if(isNaN(sec) || sec === Infinity) return "0:00";
                    const m = Math.floor(sec / 60);
                    const s = Math.floor(sec % 60).toString().padStart(2, '0');
                    return `${m}:${s}`;
                },
                updateProgress() {
                    const curr = App.audioElement.currentTime;
                    const tot = App.audioElement.duration;
                    if(isNaN(tot) || tot === Infinity) return;
                    document.getElementById('time-current').innerText = this.formatTime(curr);
                    document.getElementById('time-total').innerText = this.formatTime(tot);
                    document.getElementById('player-progress').style.width = `${(curr / tot) * 100}%`;
                }
            },

            settings: {
                toggleTheme() {
                    App.state.theme = App.state.theme === 'dark' ? 'light' : 'dark';
                    document.body.setAttribute('data-theme', App.state.theme);
                }
            },

            visualizer: {
                canvas: null, ctx: null, particles: [], offset: 0,
                init() {
                    this.canvas = document.getElementById('visualizer-canvas');
                    this.ctx = this.canvas.getContext('2d');
                    this.resize();
                    for(let i=0; i<35; i++) this.particles.push({x: Math.random(), y: Math.random(), speed: Math.random()*0.015 + 0.005});
                    window.addEventListener('resize', () => this.resize());
                    requestAnimationFrame(() => this.draw());
                },
                resize() {
                    if(!this.canvas.parentElement) return;
                    this.canvas.width = this.canvas.parentElement.clientWidth;
                    this.canvas.height = 60;
                },
                draw() {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    const isDark = App.state.theme === 'dark';
                    this.ctx.fillStyle = isDark ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.25)';
                    
                    if(App.state.isPlaying) {
                        this.particles.forEach(p => {
                            p.x += p.speed;
                            if(p.x > 1) p.x = 0;
                            this.ctx.beginPath();
                            this.ctx.arc(p.x * this.canvas.width, p.y * this.canvas.height, Math.random() > 0.8 ? 2 : 1.2, 0, Math.PI*2);
                            this.ctx.fill();
                        });
                        this.offset += 0.06;
                    }

                    this.ctx.beginPath();
                    this.ctx.strokeStyle = isDark ? '#ffffff' : '#000000';
                    this.ctx.lineWidth = 1.5;
                    const amplitude = App.state.isPlaying ? 14 : 1.5;
                    for(let i=0; i<this.canvas.width; i++) {
                        const y = Math.sin(i * 0.025 + this.offset) * amplitude + (this.canvas.height/2);
                        if(i===0) this.ctx.moveTo(i, y); else this.ctx.lineTo(i, y);
                    }
                    this.ctx.stroke();

                    requestAnimationFrame(() => this.draw());
                }
            }
        };

        window.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
